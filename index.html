<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!--CABEZARA-->
    <header class="bg-primary text-white text-center py-4 mb-4 shadow-sm">
        <h1 class="h3">Bienvenido a mi app de notas</h1>
    </header>

    <!--CONTENEDOR PRINCIPAR-->
    <main class="container">

        <!-- BOTON DE CREAR NOTAS-->
         <div class="d-flex justify-content-center mb-4">
            <button id="botonCrear" class="btn btn-success btn-lg px-4 shadow-sm">Crear nota</button>
        </div>

        <!-- CONTENEDOR DONDE SE AÑADEN LAS NOTAS -->
        <div id="contenedorNotas" class="row justify-content-start g-3"></div>

    </main>

    
   <script>
    //FUNCION PARA CREAR NOTAS Y CON BOTON DE BORRAR NOTAS 
    
        //ALMACENO NODOS
        const contenedor = document.getElementById("contenedorNotas")
        const botonCrear = document.getElementById("botonCrear")

    function crearNota(){

        let contenedorNotas = document.createElement('div')
        contenedorNotas.className = "col-12 col-md-6 col-lg-4"
        contenedor.appendChild(contenedorNotas)

        //CREO EL DIV PARA LOS 2 INPUNT DEL TITULO Y EL TEXTO
        let divInpunt = document.createElement('div')
        divInpunt.className = "card shadow-sm p-3"
        contenedorNotas.appendChild(divInpunt)
        
        //CREO LOS 2 INPUNT Y LOS METO DENTRO DE SU CONTENEDOR
        let inpuntTitulo = document.createElement('input')
        inpuntTitulo.className = "form-control mb-2"
        inpuntTitulo.placeholder = "Título"

        let inpuntTexto = document.createElement('input')
        inpuntTexto.className = "form-control mb-3"
        inpuntTexto.placeholder = "Texto"

        divInpunt.appendChild(inpuntTitulo)
        divInpunt.appendChild(inpuntTexto)
        
        //CREO EL BOTON DE BORRAR
        let botonBorrar = document.createElement('button')
        botonBorrar.className = "btn btn-danger w-100"
        botonBorrar.addEventListener('click', function(){
            contenedorNotas.remove()
        })
        let palabraBorrar = document.createTextNode("borrar")
        botonBorrar.appendChild(palabraBorrar)
        contenedorNotas.appendChild(botonBorrar)
    
    }


    botonCrear.addEventListener('click', crearNota)
   </script>

</body>
</html>
