<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de notas version 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!--CABEZARA-->
    <header class="bg-primary text-white text-center py-4 mb-4 shadow-sm">
        <h1 class="h3">Bienvenido a mi app de notas</h1>
    </header>

    <!--CONTENEDOR PRINCIPAR-->
    <main class="container">

        <!-- BOTON DE CREAR NOTAS-->
         <div class="d-flex justify-content-center mb-4">
            <button class="btn btn-success btn-lg px-4 shadow-sm" onclick="funcioncrear()">Crear nota</button>
        </div>

        <!-- CONTENEDOR DONDE SE AÑADEN LAS NOTAS -->
        <div id="contenedorNotas" class="row justify-content-center"></div>

    </main>

   <script>

        //FUNCION PARA CREAR NOTAS Y CON BOTON DE BORRAR NOTAS  
        function funcioncrear(){
            const contenedor = document.getElementById("contenedorNotas")
            const nota = document.createElement("div")
            nota.innerHTML = `
                 <div class="bg-secondary p-3 rounded shadow-sm">
                    
                    <div class="mb-2">
                        <input class="form-control" type="text" placeholder="Escribe el titulo...">
                    </div>

                    <div class="mb-3">
                        <input class="form-control" type="text" placeholder="Escribe tu nota aquí...">
                    </div>

                    <div id="agregarfila"class="mb-3">
                        <button class="btn btn-success btn-sm px-3" onclick="funcionagregar()">+ Agregar</button>
                    </div>

                    <div> 
                        <button class = "btn btn-danger btn-sm px-3" onclick="this.parentElement.parentElement.remove()">Borrar</button>    
                    </div

                </div>
            `
            //añadir la nota a su contenedor
            contenedor.appendChild(nota)

        }


   </script>

</body>
</html>
